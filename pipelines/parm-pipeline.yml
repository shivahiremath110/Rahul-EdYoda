parameters:
- name: pool
  displayName: Select Pool Name
  type: string
  default: Azure Pipelines
  values:
  - private-agent-pool
  - Default
  - Azure Pipelines
- name: env
  displayName: Select your Environment
  type: string
  default: dev
  values:
  - dev
  - test
  - prod
- name: agent
  displayName: Select Agent 
  type: string
  default: Hosted Agent
  values:
  - private-linux-agent
  - Hosted Agent
  - demo-linux-vm


trigger: none

# variables:
# - group: Dev-env-details


stages:
- stage: InfraCI
  jobs:
  - job: build
    displayName: build
    pool: 
      name: ${{ parameters.pool }}
      demands:
      - agent.name -equals ${{ parameters.agent }}


    steps:
    - task: CopyFiles@2
      displayName: 'Checkout infra code'
      inputs:
        SourceFolder: $(source_path)
        Contents: '**/**'
        TargetFolder: '$(build.artifactstagingdirectory)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish infra code to Artifact'
      inputs:
       pathToPublish: '$(Build.ArtifactStagingDirectory)'
       artifactName: ${{ parameters.env }}-infra-artifact

- stage: InfraCD
  jobs:
  - deployment: Deploy
  # - job: Deploy
    displayName: Deploy${{ parameters.env }}
    pool: 
      name: ${{ parameters.pool }}
      demands:
      - agent.name -equals ${{ parameters.agent }}
    environment: ${{ parameters.env }} 
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@0
            displayName: 'Download from Artifact'
            inputs:
             buildType: 'current'
             downloadType: 'single'
             #buildVersionToDownload: '224'
             artifactName: ${{ parameters.env }}-infra-artifact
             downloadPath: '$(Build.ArtifactStagingDirectory)'

