pool:
  name: private-agent
steps:
- task: CopyFiles@2
  displayName: 'checkout source code'
  inputs:
    SourceFolder: application
    TargetFolder: 'app-code'

- task: CopyPublishBuildArtifacts@1
  displayName: 'Publish code to artifact'
  inputs:
    CopyRoot: application
    Contents: '**'
    ArtifactName: 'application-code-artifact'
    ArtifactType: Container
